<div id="booking-widget">
  <h3>Book Your Ride</h3>
  <form id="ride-form">
    <div class="row">
      <input type="text" id="first_name" placeholder="First Name" required>
      <input type="text" id="last_name" placeholder="Last Name" required>
    </div>

    <input type="email" id="email" placeholder="Email Address" required>
    <input type="tel" id="phone" placeholder="Phone Number" required>

    <input type="text" id="pickup_address" placeholder="Pickup Address" required>
    <input type="text" id="dropoff_address" placeholder="Dropoff Address" required>
    
    <div class="row">
      <input type="datetime-local" id="start_time" required>
      <select id="vehicle_type">
        <option value="sedan-101">Luxury Sedan</option>
        <option value="suv-202">Premium SUV</option>
      </select>
    </div>

    <div id="price-summary">
      <p>Total Quote: <span id="display-total">$0.00</span></p>
      <p>Deposit Due Now: <span id="display-deposit">$0.00</span></p>
    </div>

    <button type="submit">Confirm Booking</button>
  </form>
</div>
