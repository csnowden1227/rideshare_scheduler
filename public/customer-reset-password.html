<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(180deg, #f8fafc 0%, #ffffff 44%, #eef2f7 100%); color: #0f172a; }
    .shell { max-width: 820px; margin: 0 auto; padding: 28px 18px 54px; }
    .hero, .card { border-radius: 30px; box-shadow: 0 24px 48px rgba(15,23,42,.08); }
    .hero { padding: 28px; color: #fff; background: linear-gradient(135deg, #172554 0%, #1e293b 52%, #334155 100%); }
    .hero h1 { margin: 0; font-size: clamp(32px, 5vw, 52px); line-height: 1.02; letter-spacing: -.04em; }
    .hero p { margin: 14px 0 0; line-height: 1.8; color: rgba(255,255,255,.88); }
    .card { margin-top: 22px; background: rgba(255,255,255,.95); border: 1px solid rgba(148,163,184,.22); padding: 24px; }
    .field { margin-top: 14px; }
    .field label { display: block; margin-bottom: 6px; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: .12em; color: #475569; }
    .field input { width: 100%; padding: 14px 15px; border-radius: 16px; border: 1px solid #cbd5e1; background: #fff; font-size: 14px; }
    .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 18px; }
    .btn { display: inline-flex; align-items: center; justify-content: center; min-height: 48px; padding: 12px 16px; border-radius: 16px; border: 0; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: 800; }
    .btn.primary { background: #172554; color: #fff; }
    .btn.secondary { background: #eef2ff; color: #3730a3; }
    .message { display: none; margin-top: 14px; padding: 12px 14px; border-radius: 14px; font-size: 14px; line-height: 1.7; }
    .message.error { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .message.success { background: #ecfdf5; color: #166534; border: 1px solid #bbf7d0; }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <h1>Create a New Password</h1>
      <p>Set a fresh password for your Pro customer account so you can get back into your rides and account tools.</p>
    </section>

    <section class="card">
      <div class="field"><label for="password">New Password</label><input id="password" type="password" placeholder="Minimum 8 characters" /></div>
      <div class="field"><label for="confirm-password">Confirm Password</label><input id="confirm-password" type="password" placeholder="Re-enter your password" /></div>
      <div class="actions">
        <button id="save-button" class="btn primary" type="button">Save Password</button>
        <a id="login-link" class="btn secondary" href="/customer-login">Back to Login</a>
      </div>
      <div id="error-message" class="message error"></div>
      <div id="success-message" class="message success"></div>
    </section>
  </div>

  <script>
    (function () {
      const query = new URLSearchParams(window.location.search);
      const token = String(query.get("token") || "").trim();

      function setMessage(id, text) {
        const el = document.getElementById(id);
        if (!el) return;
        el.textContent = text;
        el.style.display = text ? "block" : "none";
      }

      async function postJson(url, payload) {
        const response = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
          credentials: "same-origin",
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "Request failed.");
        return data;
      }

      document.getElementById("save-button")?.addEventListener("click", async () => {
        setMessage("error-message", "");
        setMessage("success-message", "");
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirm-password").value;
        if (!token) {
          setMessage("error-message", "This reset link is missing its token.");
          return;
        }
        if (!password || password.length < 8) {
          setMessage("error-message", "Please enter a password with at least 8 characters.");
          return;
        }
        if (password !== confirmPassword) {
          setMessage("error-message", "The password confirmation does not match.");
          return;
        }
        try {
          const data = await postJson("/api/customer-account/reset-password", { token, password });
          setMessage("success-message", data.message || "Password updated successfully. Redirecting to login...");
          window.setTimeout(() => {
            window.location.href = "/customer-login";
          }, 900);
        } catch (error) {
          setMessage("error-message", error.message || "Unable to reset password.");
        }
      });
    })();
  </script>
</body>
</html>
