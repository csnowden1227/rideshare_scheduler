<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chauffeur Deluxe | Setup Wizard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-mini {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            outline: none;
        }
        .input-mini:focus { border-color: #000; outline: none; box-shadow: 0 0 0 2px #f3f4f6; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

<div class="max-w-5xl mx-auto p-6 md:p-12">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
        <div>
            <h1 class="text-4xl font-extrabold tracking-tight">Setup Wizard</h1>
            <p class="text-gray-500 mt-1">Configure your fleet, special events, and route pricing.</p>
        </div>
        
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-200 flex items-center space-x-4">
            <span class="text-sm font-bold uppercase tracking-wider text-gray-600">Live Booking:</span>
            <label class="relative inline-flex items-center cursor-pointer">
                <input type="checkbox" id="booking_enabled" class="sr-only peer" checked>
                <div class="w-14 h-7 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-green-600"></div>
            </label>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-6">
            
            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200">
                <h2 class="text-xl font-bold mb-6 flex items-center">
                    <span class="bg-black text-white w-8 h-8 rounded-lg flex items-center justify-center mr-3 text-sm">1</span>
                    Business Configuration
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">Google Maps API Key</label>
                        <input type="password" id="maps_key" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-black outline-none transition" placeholder="AIzaSy...">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-2">CRM API Key</label>
                        <input type="password" id="CRM_One_Source_key" class="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-black outline-none transition" placeholder="Your CRM Key">
                    </div>
                </div>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center">
                        <span class="bg-black text-white w-8 h-8 rounded-lg flex items-center justify-center mr-3 text-sm">2</span>
                        Fixed Route Geofencing
                    </h2>
                    <button type="button" onclick="addRouteRow()" class="text-xs font-bold bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-blue-700">+ Add Route</button>
                </div>
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-xs uppercase text-gray-400 border-b border-gray-100">
                            <th class="pb-4">From (Keyword)</th>
                            <th class="pb-4">To (Keyword)</th>
                            <th class="pb-4">Flat Price</th>
                            <th class="pb-4"></th>
                        </tr>
                    </thead>
                    <tbody id="routes-body"></tbody>
                </table>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-200">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold flex items-center">
                        <span class="bg-black text-white w-8 h-8 rounded-lg flex items-center justify-center mr-3 text-sm">3</span>
                        Special Event Multipliers
                    </h2>
                    <button type="button" onclick="addEventRow()" class="text-xs font-bold bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-blue-700">+ Add Event</button>
                </div>
                <table class="w-full text-left">
                    <thead>
                        <tr class="text-xs uppercase text-gray-400 border-b border-gray-100">
                            <th class="pb-4">Event Name</th>
                            <th class="pb-4">Date</th>
                            <th class="pb-4">Multiplier</th>
                            <th class="pb-4"></th>
                        </tr>
                    </thead>
                    <tbody id="events-body"></tbody>
                </table>
            </div>
        </div>

        <div class="space-y-6">
            <div class="bg-gray-900 text-white p-8 rounded-3xl shadow-2xl sticky top-6">
                <h2 class="text-xl font-bold mb-4">Actions</h2>
                <button onclick="saveSettings()" id="save-settings-btn" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-gray-200 transition-all shadow-lg transform hover:-translate-y-1">
                    SAVE ALL SETTINGS
                </button>
                <div class="mt-8 pt-8 border-t border-gray-800">
                    <pre id="embed-code-box" class="bg-black p-5 rounded-xl text-[10px] text-green-400 overflow-x-auto border border-gray-700"></pre>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const BACKEND_URL = "https://chauffeur.crmonesource.com";
    const urlParams = new URLSearchParams(window.location.search);
    const locationId = urlParams.get('location_id') || 'TEST_LOC';

    // --- Dynamic Row Logic ---

    function addRouteRow(from = '', to = '', price = '') {
        const container = document.getElementById('routes-body');
        const tr = document.createElement('tr');
        tr.className = "route-row border-b border-gray-50";
        tr.innerHTML = `
            <td class="py-4"><input type="text" class="route-from input-mini" value="${from}" placeholder="e.g. JFK"></td>
            <td class="py-4"><input type="text" class="route-to input-mini" value="${to}" placeholder="e.g. Manhattan"></td>
            <td class="py-4"><input type="number" class="route-price input-mini" value="${price}" placeholder="150"></td>
            <td class="py-4 text-right"><button type="button" onclick="this.closest('tr').remove()" class="text-red-400">×</button></td>
        `;
        container.appendChild(tr);
    }

    function addEventRow(name = '', date = '', mult = '2.0') {
        const container = document.getElementById('events-body');
        const tr = document.createElement('tr');
        tr.className = "event-row border-b border-gray-50";
        tr.innerHTML = `
            <td class="py-4"><input type="text" class="event-name input-mini" value="${name}" placeholder="Super Bowl"></td>
            <td class="py-4"><input type="date" class="event-date input-mini" value="${date}"></td>
            <td class="py-4"><input type="number" step="0.1" class="event-multiplier input-mini" value="${mult}"></td>
            <td class="py-4 text-right"><button type="button" onclick="this.closest('tr').remove()" class="text-red-400">×</button></td>
        `;
        container.appendChild(tr);
    }

    // --- Save Logic ---

    async function saveSettings() {
        const btn = document.getElementById('save-settings-btn');
        btn.innerText = "SAVING...";
        
        // Collect Routes
        const routes = Array.from(document.querySelectorAll('.route-row')).map(row => ({
            pickup: row.querySelector('.route-from').value,
            dropoff: row.querySelector('.route-to').value,
            price: row.querySelector('.route-price').value
        }));

        // Collect Events
        const events = Array.from(document.querySelectorAll('.event-row')).map(row => ({
            name: row.querySelector('.event-name').value,
            date: row.querySelector('.event-date').value,
            multiplier: row.querySelector('.event-multiplier').value
        }));

        const payload = {
            userId: locationId,
            maps_api_key: document.getElementById('maps_key').value,
            tax_rate: document.getElementById('tax_rate')?.value || 0,
            fixed_rates: routes,
            events: events
        };

        const res = await fetch(`${BACKEND_URL}/api/update-profile-full`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (res.ok) alert("✅ Saved!");
        btn.innerText = "SAVE ALL SETTINGS";
    }

    window.onload = () => {
        document.getElementById('embed-code-box').innerText = `<script src="${BACKEND_URL}/widget.js?loc=${locationId}"><\/script>`;
    };
</script>
</body>
</html>
