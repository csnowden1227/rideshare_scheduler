<script>
const BACKEND_URL = "https://rideshare-scheduler-axx6.onrender.com";

const params = new URLSearchParams(window.location.search);
const pathParts = window.location.pathname.split('/').filter(Boolean);

const locationId =
  params.get("location_id") ||
  pathParts[1] ||
  "LOC_DEMO";

console.log("Detected Location ID:", locationId);

const VEHICLE_LIST = [
    "Standard Sedan",
    "Luxury Sedan",
    "Standard SUV",
    "Luxury SUV",
    "Standard XL SUV",
    "Luxury XL SUV"
];

// --- UI RENDERERS ---
function renderFleet(count, savedFleet = []) {
    const tbody = document.getElementById('fleet-body');
    tbody.innerHTML = "";
    for (let i = 1; i <= count; i++) {
        const slotId = `${locationId}_vehicle_${i}`;
        const data = savedFleet.find(f => f.vehicle_id === slotId) || {};
        const tr = document.createElement('tr');
        tr.className = "border-b border-slate-50";
        tr.innerHTML = `
            <td class="py-4 font-mono text-[9px] text-slate-400 font-bold">${slotId}</td>
            <td><select class="v-type input-mini font-bold">
                ${VEHICLE_LIST.map(v => `<option value="${v}" ${data.vehicle_type === v ? 'selected' : ''}>${v}</option>`).join('')}
            </select></td>
            <td><input type="number" class="v-base input-mini" value="${data.base_rate || 50}"></td>
            <td><input type="number" step="0.1" class="v-mile input-mini" value="${data.mile_rate || 3.5}"></td>
            <td><input type="text" class="v-cal input-mini" value="${data.calendar_id || ''}"></td>
        `;
        tbody.appendChild(tr);
    }
}

function addRouteRow(data = {}) {
    const container = document.getElementById('routes-container');
    const div = document.createElement('div');
    div.className = "route-row border border-slate-200 p-4 rounded-xl bg-white space-y-3";
    const uid = Math.random().toString(36).substr(2, 5);
    div.innerHTML = `
        <div class="flex flex-col md:flex-row gap-3">
            <div class="flex-1">
                <label class="text-[9px] uppercase font-bold text-slate-400">Pickup Address</label>
                <input type="text" id="p-${uid}" class="r-pickup input-mini mb-1" value="${data.pickup_keyword || data.pickup_address_keyword || data.pickup || ''}" placeholder="Address">
                <div class="flex gap-1">
                    <input type="text" class="r-p-lat input-mini coord-input" placeholder="Lat" value="${data.pickup_lat || ''}">
                    <input type="text" class="r-p-lng input-mini coord-input" placeholder="Lng" value="${data.pickup_lng || ''}">
                </div>
            </div>
            <div class="flex-1">
                <label class="text-[9px] uppercase font-bold text-slate-400">Dropoff Address</label>
                <input type="text" id="d-${uid}" class="r-dropoff input-mini mb-1" value="${data.dropoff_keyword || data.dropoff_address_keyword || data.dropoff || ''}" placeholder="Address">
                <div class="flex gap-1">
                    <input type="text" class="r-d-lat input-mini coord-input" placeholder="Lat" value="${data.dropoff_lat || ''}">
                    <input type="text" class="r-d-lng input-mini coord-input" placeholder="Lng" value="${data.dropoff_lng || ''}">
                </div>
            </div>
            <div class="w-full md:w-32">
                <label class="text-[9px] uppercase font-bold text-slate-400">Flat Rate ($)</label>
                <input type="number" class="r-price input-mini h-[72px] text-lg font-bold" value="${data.fixed_price || data.price || ''}" placeholder="0.00">
            </div>
            <button onclick="this.closest('.route-row').remove()" class="text-red-400 px-2 font-bold self-center">&times;</button>
        </div>
    `;
    container.appendChild(div);

    const pAuto = new google.maps.places.Autocomplete(document.getElementById(`p-${uid}`));
    pAuto.addListener('place_changed', () => {
        const place = pAuto.getPlace();
        if (place.geometry) {
            div.querySelector('.r-p-lat').value = place.geometry.location.lat();
            div.querySelector('.r-p-lng').value = place.geometry.location.lng();
        }
    });

    const dAuto = new google.maps.places.Autocomplete(document.getElementById(`d-${uid}`));
    dAuto.addListener('place_changed', () => {
        const place = dAuto.getPlace();
        if (place.geometry) {
            div.querySelector('.r-d-lat').value = place.geometry.location.lat();
            div.querySelector('.r-d-lng').value = place.geometry.location.lng();
        }
    });
}

function addPeakRow(data = {}) {
    const tr = document.createElement('tr');
    tr.className = "peak-row border-b border-slate-50";
    tr.innerHTML = `
        <td class="py-3 pr-2"><select class="p-day input-mini"><option ${data.day==='Weekdays'?'selected':''}>Weekdays</option><option ${data.day==='Weekends'?'selected':''}>Weekends</option><option ${data.day==='Everyday'?'selected':''}>Everyday</option></select></td>
        <td class="py-3 pr-2"><input type="time" class="p-start input-mini" value="${data.start_time || '17:00'}"></td>
        <td class="py-3 pr-2"><input type="time" class="p-end input-mini" value="${data.end_time || '19:00'}"></td>
        <td class="py-3 pr-2"><input type="number" step="0.1" class="p-mult input-mini" value="${data.multiplier || 1.5}"></td>
        <td><button onclick="this.closest('tr').remove()" class="text-red-400 font-bold">&times;</button></td>
    `;
    document.getElementById('peak-body').appendChild(tr);
}

function addEventRow(data = {}) {
    const tr = document.createElement('tr');
    tr.className = "event-row border-b border-slate-50";
    tr.innerHTML = `
        <td class="py-3 pr-2"><input type="text" class="e-name input-mini" placeholder="Event" value="${data.event_name || data.name || ''}"></td>
        <td class="py-3 pr-2"><input type="date" class="e-date input-mini" value="${data.event_date || data.date || ''}"></td>
        <td class="py-3 pr-2"><input type="number" class="e-base input-mini" value="${data.base_rate || 50}"></td>
        <td class="py-3 pr-2"><input type="number" step="0.1" class="e-mile input-mini" value="${data.mile_rate || 3.5}"></td>
        <td class="py-3 pr-2"><input type="number" step="0.1" class="e-mult input-mini" value="${data.multiplier || 2.0}"></td>
        <td class="text-right"><button onclick="this.closest('tr').remove()" class="text-red-400 font-bold">&times;</button></td>
    `;
    document.getElementById('event-body').appendChild(tr);
}

async function saveToBackend() {
    const btn = document.getElementById('save-btn');
    const crmInput = document.getElementById('location_input').value.trim();

    if (crmInput && !crmInput.startsWith('http')) {
        alert("⚠️ Warning: Your CRM URL does not start with https://. This usually causes sync failures.");
    }

    btn.innerText = "VALIDATING & SYNCING...";

    const payload = {
        location_id: locationId,
        crm_webhook_url: crmInput,
        maps_api_key: document.getElementById('maps_key').value,
        tax_rate: parseFloat(document.getElementById('tax_rate').value) || 0,
        fleet: Array.from(document.querySelectorAll('#fleet-body tr')).map(tr => ({
            vehicle_id: tr.cells[0].innerText,
            vehicle_type: tr.querySelector('.v-type').value,
            base_rate: parseFloat(tr.querySelector('.v-base').value) || 0,
            mile_rate: parseFloat(tr.querySelector('.v-mile').value) || 0,
            calendar_id: tr.querySelector('.v-cal').value
        })),
        fixed_rates: Array.from(document.querySelectorAll('.route-row')).map(r => ({
            pickup_keyword: r.querySelector('.r-pickup').value,
            pickup_lat: parseFloat(r.querySelector('.r-p-lat').value) || 0,
            pickup_lng: parseFloat(r.querySelector('.r-p-lng').value) || 0,
            dropoff_keyword: r.querySelector('.r-dropoff').value,
            dropoff_lat: parseFloat(r.querySelector('.r-d-lat').value) || 0,
            dropoff_lng: parseFloat(r.querySelector('.r-d-lng').value) || 0,
            fixed_price: parseFloat(r.querySelector('.r-price').value) || 0
        })),
        peak_windows: Array.from(document.querySelectorAll('.peak-row')).map(r => ({
            day: r.querySelector('.p-day').value,
            start_time: r.querySelector('.p-start').value,
            end_time: r.querySelector('.p-end').value,
            multiplier: parseFloat(r.querySelector('.p-mult').value) || 1.0
        })),
        events: Array.from(document.querySelectorAll('.event-row')).map(e => ({
            event_name: e.querySelector('.e-name').value,
            event_date: e.querySelector('.e-date').value,
            base_rate: parseFloat(e.querySelector('.e-base').value) || 0,
            mile_rate: parseFloat(e.querySelector('.e-mile').value) || 0,
            multiplier: parseFloat(e.querySelector('.e-mult').value) || 1.0
        }))
    };

    try {
        const res = await fetch(`${BACKEND_URL}/api/update-profile-full`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (res.ok) {
            alert("✅ Sync Successful!\nDatabase updated and CRM link verified.");
        } else {
            console.error("Debug Info:", { sent: payload, received: result });
            const errorMsg = result.details || result.error || "";
            alert(`❌ Sync Failed: ${errorMsg || 'Database connection error'}`);
        }
    } catch (e) {
        console.error(e);
        alert("❌ Network Error: Could not reach the Render server.");
    } finally {
        btn.innerText = "Sync to Cloud";
    }
}

async function loadFromBackend() {
    if (!locationId) {
        document.getElementById('display-loc-id').innerText = 'NO LOCATION';
        document.getElementById('plan-badge').innerText = 'Starter Plan';
        document.getElementById('embed-box').innerText = '';
        renderFleet(1);
        return;
    }

    document.getElementById('display-loc-id').innerText = locationId;
    document.getElementById('embed-box').innerText = `<script src="${BACKEND_URL}/widget.js?loc=${locationId}"><\/script>`;

    try {
        const res = await fetch(`${BACKEND_URL}/api/get-profile/${locationId}`);
        const data = await res.json();

        const generatedWebhookUrl = `https://services.leadconnectorhq.com/hooks/${locationId}/webhook-trigger/e8f1fd42-8f7e-4818-a94d-dd7985e12838`;
        document.getElementById('location_input').value = generatedWebhookUrl;

        if (data && !data.error) {
            document.getElementById('maps_key').value = data.maps_api_key || '';
            document.getElementById('tax_rate').value = data.tax_rate || '0.00';

            const rawPlan = (data.plan_name || 'Starter').toLowerCase().trim();
            let planLabel = 'Starter';
            let count = 1;

            if (rawPlan === 'premium') {
                planLabel = 'Premium';
                count = 2;
            } else if (rawPlan === 'pro') {
                planLabel = 'Pro';
                count = 3;
            }

            document.getElementById('plan-badge').innerText = planLabel + " Plan";

            document.getElementById('routes-container').innerHTML = '';
            document.getElementById('peak-body').innerHTML = '';
            document.getElementById('event-body').innerHTML = '';

            renderFleet(count, data.fleet || []);
            if (data.fixed_rates) data.fixed_rates.forEach(r => addRouteRow(r));
            if (data.peak_windows) data.peak_windows.forEach(p => addPeakRow(p));
            if (data.events) data.events.forEach(e => addEventRow(e));
        } else {
            document.getElementById('plan-badge').innerText = 'Starter Plan';
            renderFleet(1);
        }
    } catch (e) {
        console.error("loadFromBackend error:", e);
        document.getElementById('plan-badge').innerText = 'Starter Plan';
        renderFleet(1);
    }
}

function copyEmbed() {
    navigator.clipboard.writeText(document.getElementById('embed-box').innerText);
    alert("Embed code copied!");
}

window.onload = loadFromBackend;
</script>
</body>
</html>
