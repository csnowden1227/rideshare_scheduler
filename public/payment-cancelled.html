<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Cancelled</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f8fafc;
      color: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      width: min(680px, 100%);
      background: #ffffff;
      border: 1px solid #dbe4f0;
      border-radius: 24px;
      box-shadow: 0 24px 50px rgba(15, 23, 42, 0.08);
      padding: 32px;
    }
    .eyebrow {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #0f766e;
    }
    h1 {
      margin: 12px 0 0;
      font-size: 30px;
    }
    p {
      color: #475569;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Secure Checkout</div>
    <h1>Payment cancelled</h1>
    <p>No payment was taken. If you still need to complete your reservation balance, return to the payment link in your reminder email or text.</p>
  </div>
</body>
</html>
